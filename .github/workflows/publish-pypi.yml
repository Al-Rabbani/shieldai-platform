name: Publish shieldai-zen to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'pypi-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shieldai-zen-python

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Verify build artifacts
        run: ls -lh dist/

      # Primary: Trusted Publisher (OIDC) — no token needed if PyPI project is configured
      - name: Publish via Trusted Publisher (OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        id: oidc_publish

      # Fallback: API token (if OIDC/Trusted Publisher not yet configured on PyPI)
      - name: Publish via API token (fallback)
        if: steps.oidc_publish.outcome == 'failure'
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
