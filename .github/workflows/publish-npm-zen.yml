name: Publish @shieldai/zen to npm

on:
  workflow_dispatch:          # Manual trigger — click "Run workflow" in GitHub Actions
  push:
    tags:
      - 'zen-v*'              # Auto-trigger on: git tag zen-v1.0.0 && git push --tags

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zen-firewall-sdk

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npx tsc

      - name: Verify build
        run: ls dist/

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
