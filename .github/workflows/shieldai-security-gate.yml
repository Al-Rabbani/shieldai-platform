name: 🛡️ ShieldAI Security Gate

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

jobs:
  security-gate:
    name: ShieldAI Security Scan & Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 🔍 Run ShieldAI Security Gate
        id: gate
        env:
          SHIELDAI_GATE_URL: ${{ secrets.SHIELDAI_GATE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          COMMIT_SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"

          echo "Running ShieldAI gate for $REPO @ $COMMIT_SHA"

          RESPONSE=$(curl -s -X POST "${SHIELDAI_GATE_URL}" \
            -H "Content-Type: application/json" \
            -d "{
              \"repo_full_name\": \"${REPO}\",
              \"commit_sha\": \"${COMMIT_SHA}\",
              \"pr_number\": ${PR_NUMBER:-0},
              \"branch\": \"${BRANCH}\",
              \"github_token\": \"${GITHUB_TOKEN}\",
              \"block_on\": [\"critical\"],
              \"fail_on_secrets\": true,
              \"fail_on_new_critical\": true
            }")

          echo "Response: $RESPONSE"

          PASS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('pass', False)).lower())")
          CRITICAL=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('summary',{}).get('critical', 0))")
          REASONS=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print('; '.join(d.get('block_reasons', [])))")

          echo "pass=$PASS" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "reasons=$REASONS" >> $GITHUB_OUTPUT

      - name: 🚫 Gate Decision
        run: |
          if [ "${{ steps.gate.outputs.pass }}" = "true" ]; then
            echo "✅ ShieldAI Security Gate PASSED"
            echo "Critical findings: ${{ steps.gate.outputs.critical }}"
            exit 0
          else
            echo "❌ ShieldAI Security Gate BLOCKED"
            echo "Reason: ${{ steps.gate.outputs.reasons }}"
            exit 1
          fi

  autofix-trigger:
    name: Trigger AutoFix for New Findings
    runs-on: ubuntu-latest
    needs: security-gate
    if: failure()
    steps:
      - name: 🔧 Trigger ShieldAI AutoFix
        env:
          SHIELDAI_AUTOFIX_URL: ${{ secrets.SHIELDAI_AUTOFIX_URL }}
        run: |
          echo "Gate failed — triggering AutoFix for open critical findings"
          curl -s -X POST "${SHIELDAI_AUTOFIX_URL}" \
            -H "Content-Type: application/json" \
            -d "{
              \"action\": \"bulk_fix\",
              \"repo_full_name\": \"${{ github.repository }}\",
              \"max_prs\": 5
            }"
          echo "AutoFix PRs triggered. Check the repo for new fix branches."
